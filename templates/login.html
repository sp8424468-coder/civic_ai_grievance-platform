<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-xl shadow-lg w-96">

<h2 class="text-2xl font-bold text-center mb-6">User Login</h2>

<form action="/login-user" method="POST" class="space-y-4">

<input 
name="email"
placeholder="Email Address"
class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
/>

<input 
name="password"
type="password"
placeholder="Password"
class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
/>

<button 
type="submit"
class="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700 transition"
>
Login
</button>

</form>

<p class="text-center mt-4 text-sm">

New user?

<a href="/register" class="text-blue-600 font-semibold">Register</a>

</p>

</div>

</body>
</html>
