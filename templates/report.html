<!DOCTYPE html>
<html>
<head>

<title>Report Civic Issue</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

/* Navbar */

.navbar{
background:#2c3e50;
color:white;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

.nav-links a{
color:white;
margin-left:20px;
text-decoration:none;
}

.profile-icon img{
width:35px;
margin-left:20px;
cursor:pointer;
}

/* Form Container */

.container{
background:white;
padding:30px;
max-width:500px;
margin:40px auto;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

label{
font-weight:bold;
}

input, textarea{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:20px;
border:1px solid #ccc;
border-radius:4px;
}

button{
background:#3498db;
color:white;
border:none;
padding:12px;
width:100%;
cursor:pointer;
margin-top:10px;
border-radius:5px;
font-size:15px;
}

button:hover{
background:#2980b9;
}

/* Success Box */

.successBox{
display:none;
background:#e8f5e9;
padding:20px;
margin-top:20px;
border-radius:8px;
border-left:5px solid #2ecc71;
}

.nav-links{
display:flex;
align-items:center;
gap:20px;
}

.profile-menu{
position:relative;
}

.profile-icon{
width:32px;
cursor:pointer;
}

.dropdown{
display:none;
position:absolute;
right:0;
top:40px;
background:white;
border:1px solid #ddd;
border-radius:6px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
min-width:150px;
}

.dropdown a{
display:block;
padding:10px;
color:black;
text-decoration:none;
}

.dropdown a:hover{
background:#f2f2f2;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">
<strong>Civic AI</strong>
</div>

<div class="nav-links">

<a href="/">Home</a>
<a href="/track">Track Complaint</a>

<div class="profile-menu">

<img src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png" class="profile-icon" onclick="toggleMenu()">

<div id="profileDropdown" class="dropdown">

<a href="/profile">My Profile</a>
<a href="/logout">Logout</a>

</div>

</div>

</div>

</div>

<!-- REPORT FORM -->

<div class="container">

<h2>Report Civic Issue</h2>

<label>Location</label>

<input id="location" placeholder="Click 'Use My Location'" readonly>

<button onclick="getLocation()">Use My Location</button>


<label>Problem Description</label>

<textarea id="description" placeholder="Describe the issue"></textarea>


<label>Upload Photo Evidence</label>

<input type="file" id="photo" accept="image/*">


<button onclick="submitComplaint()">Submit Complaint</button>


<!-- Success Message -->

<div id="successBox" class="successBox">

<h3>Complaint Registered Successfully ✅</h3>

<p>Your Complaint ID: <strong id="complaintIdText"></strong></p>

<p>Please save this ID to track your complaint.</p>

</div>

</div>


<script>

let latitude = null
let longitude = null


function getLocation(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(position){

latitude = position.coords.latitude
longitude = position.coords.longitude

document.getElementById("location").value =
"Lat: " + latitude + " , Lng: " + longitude

})

}else{

alert("Geolocation not supported")

}

}


async function submitComplaint(){

let description = document.getElementById("description").value
let photo = document.getElementById("photo").files[0]


if(latitude == null){
alert("Please click 'Use My Location' first")
return
}

if(!description){
alert("Please enter problem description")
return
}

if(!photo){
alert("Please upload a photo")
return
}


let formData = new FormData()

formData.append("description", description)
formData.append("latitude", latitude)
formData.append("longitude", longitude)
formData.append("photo", photo)


let response = await fetch("/submit-complaint",{
method:"POST",
body:formData
})


let data = await response.json()


if(response.ok){

// show success message
document.getElementById("successBox").style.display = "block"

// show complaint id
document.getElementById("complaintIdText").innerText = data.complaint_id

// clear form
document.getElementById("description").value=""
document.getElementById("photo").value=""

}else{

alert(data.error)

}

}

function toggleMenu(){

let menu = document.getElementById("profileDropdown")

if(menu.style.display === "block"){
menu.style.display = "none"
}else{
menu.style.display = "block"
}

}

</script>

</body>
</html>
