<!DOCTYPE html>
<html>
<head>

<title>Department Admin Login</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
width:350px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:20px;
border:1px solid #ccc;
border-radius:4px;
}

button{
width:100%;
padding:12px;
background:#3498db;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Department Admin Login</h2>

<form action="/department-admin-login" method="POST">

<input type="email" name="email" placeholder="Department Admin Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
