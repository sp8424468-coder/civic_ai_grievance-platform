<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-xl shadow-lg w-96">

<h2 class="text-2xl font-bold text-center mb-6">Create Account</h2>

<form action="/register-user" method="POST" class="space-y-4">

<input 
name="name"
placeholder="Full Name"
class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
/>

<input 
name="email"
placeholder="Email Address"
class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
/>

<input 
name="password"
type="password"
placeholder="Password"
class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
/>

<button 
type="submit"
class="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700 transition"
>
Register
</button>

</form>

<p class="text-center mt-4 text-sm">

Already have an account?

<a href="/login" class="text-blue-600 font-semibold">Login</a>

</p>

</div>

</body>
</html>
