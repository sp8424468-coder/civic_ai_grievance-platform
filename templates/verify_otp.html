<!DOCTYPE html>
<html>
<head>

<title>Verify OTP</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-xl shadow-lg w-96 text-center">

<h2 class="text-2xl font-bold mb-4">Email Verification</h2>

<p class="text-gray-500 mb-6">
Enter the OTP sent to your email
</p>

<form action="/verify-otp" method="POST" class="space-y-4">

<input 
type="hidden"
name="email"
value="{{email}}"
/>

<input 
name="otp"
placeholder="Enter OTP"
class="w-full border p-3 rounded-lg text-center text-lg tracking-widest focus:outline-none focus:ring-2 focus:ring-blue-500"
/>

<button 
type="submit"
class="w-full bg-green-600 text-white p-3 rounded-lg hover:bg-green-700 transition"
>
Verify OTP
</button>

</form>

</div>

</body>
</html>
