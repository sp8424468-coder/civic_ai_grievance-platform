<!DOCTYPE html>
<html>
<head>

<title>Departments</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:40px;
}

form{
background:white;
padding:20px;
margin-bottom:30px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

input{
padding:10px;
margin-right:10px;
}

button{
padding:10px 15px;
background:#3498db;
color:white;
border:none;
}

table{
width:100%;
background:white;
border-collapse:collapse;
}

th,td{
padding:12px;
border:1px solid #ddd;
}

th{
background:#2c3e50;
color:white;
}

</style>

</head>

<body>

<h1>Department Management</h1>

<form action="/create-department" method="POST">

<input type="text" name="name" placeholder="Department Name" required>

<input type="email" name="admin_email" placeholder="Department Admin Email" required>

<input type="password" name="admin_password" placeholder="Admin Password" required>

<button type="submit">Create Department</button>

</form>

<table>

<tr>
<th>ID</th>
<th>Department</th>
<th>Admin Email</th>
</tr>

{% for dept in departments %}

<tr>

<td>{{ dept.id }}</td>
<td>{{ dept.name }}</td>
<td>{{ dept.admin_email }}</td>

</tr>

{% endfor %}

</table>

</body>
</html>
